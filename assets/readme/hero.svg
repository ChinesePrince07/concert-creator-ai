<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="410" viewBox="0 0 1200 410" role="img" aria-labelledby="title desc">
  <title id="title">Concert Creator — AI Virtual Pianist</title>
  <desc id="desc">A cinematic piano-stage title card showing music flowing through hand separation, fingering, choreography, and camera direction.</desc>
  <rect width="1200" height="410" rx="28" fill="#100d12"/>
  <path d="M0 337H1200" stroke="#6f2033" stroke-width="2"/>
  <g transform="translate(58 48)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" letter-spacing="3" fill="#d9a85f">BROWSER-NATIVE PERFORMANCE ENGINE</text>
    <text y="79" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#fff8eb">Concert Creator</text>
    <text y="134" font-family="Georgia, 'Times New Roman', serif" font-size="35" font-style="italic" fill="#d8c8b5">AI Virtual Pianist</text>
    <text y="188" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#b9aeb7">Turn piano audio or MIDI into a directed 3D performance.</text>
    <g transform="translate(0 232)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">
      <text fill="#d9a85f">NOTES</text><path d="M66 -6H110" stroke="#6f2033" stroke-width="2"/>
      <text x="124" fill="#eee1d1">HANDS</text><path d="M190 -6H234" stroke="#6f2033" stroke-width="2"/>
      <text x="248" fill="#eee1d1">MOTION</text><path d="M320 -6H364" stroke="#6f2033" stroke-width="2"/>
      <text x="378" fill="#eee1d1">CAMERA</text><path d="M449 -6H493" stroke="#6f2033" stroke-width="2"/>
      <text x="507" fill="#eee1d1">VIDEO</text>
    </g>
  </g>
  <g transform="translate(745 46)">
